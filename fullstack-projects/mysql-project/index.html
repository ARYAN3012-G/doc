<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySQL User Management</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 2rem; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; font-size: 2rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #22c55e, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 1.5rem; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
        .stat-card { background: #1e293b; padding: 14px; border-radius: 10px; text-align: center; }
        .stat-card .number { font-size: 1.5rem; font-weight: 700; color: #22c55e; }
        .stat-card .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 1.5rem; }
        form { display: grid; grid-template-columns: 1fr 1fr 80px 120px auto; gap: 10px; }
        input, select { padding: 12px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: 0.9rem; outline: none; }
        input:focus { border-color: #22c55e; }
        button { padding: 12px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.2s; }
        .btn-add { background: #22c55e; color: white; }
        .btn-add:hover { background: #16a34a; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 1rem; }
        .search-bar input { flex: 1; }
        .search-bar select { width: 150px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid #334155; }
        td { padding: 12px; border-bottom: 1px solid #1e293b; }
        tr:hover { background: #1e293b; }
        .role-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .role-admin { background: #7c3aed20; color: #a78bfa; }
        .role-moderator { background: #f59e0b20; color: #fbbf24; }
        .role-user { background: #06b6d420; color: #22d3ee; }
        .status-active { color: #22c55e; }
        .status-inactive { color: #ef4444; }
        .actions { display: flex; gap: 4px; }
        .btn-toggle { background: #334155; color: #e2e8f0; padding: 6px 10px; font-size: 0.75rem; }
        .btn-delete { background: #dc262620; color: #ef4444; padding: 6px 10px; font-size: 0.75rem; }
        .btn-delete:hover { background: #dc2626; color: white; }
        .empty { text-align: center; padding: 2rem; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👥 User Management</h1>
        <p class="subtitle">Full CRUD with MySQL & Express</p>

        <div class="stats" id="stats"></div>

        <div class="card">
            <form id="user-form">
                <input type="text" id="name" placeholder="Name" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="number" id="age" placeholder="Age" min="0">
                <select id="role">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                    <option value="moderator">Moderator</option>
                </select>
                <button type="submit" class="btn-add">Add</button>
            </form>
        </div>

        <div class="search-bar">
            <input type="text" id="search" placeholder="Search by name or email..." oninput="fetchUsers()">
            <select id="filter-role" onchange="fetchUsers()">
                <option value="">All Roles</option>
                <option value="user">User</option>
                <option value="admin">Admin</option>
                <option value="moderator">Moderator</option>
            </select>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Age</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="user-table"></tbody>
            </table>
            <div class="empty" id="empty-msg" style="display:none">No users found.</div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5002/api';

        async function fetchStats() {
            const res = await fetch(`${API}/stats`);
            const { data } = await res.json();
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="number">${data.total}</div><div class="label">Total</div></div>
                <div class="stat-card"><div class="number">${data.active}</div><div class="label">Active</div></div>
                <div class="stat-card"><div class="number">${data.inactive}</div><div class="label">Inactive</div></div>
                <div class="stat-card"><div class="number">${data.admins}</div><div class="label">Admins</div></div>
            `;
        }

        async function fetchUsers() {
            const search = document.getElementById('search').value;
            const role = document.getElementById('filter-role').value;
            let url = `${API}/users?`;
            if (search) url += `search=${search}&`;
            if (role) url += `role=${role}&`;

            const res = await fetch(url);
            const { data } = await res.json();
            const tbody = document.getElementById('user-table');
            const emptyMsg = document.getElementById('empty-msg');

            if (data.length === 0) {
                tbody.innerHTML = '';
                emptyMsg.style.display = 'block';
                return;
            }
            emptyMsg.style.display = 'none';

            tbody.innerHTML = data.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.name}</td>
                    <td>${u.email}</td>
                    <td>${u.age}</td>
                    <td><span class="role-badge role-${u.role}">${u.role}</span></td>
                    <td><span class="${u.is_active ? 'status-active' : 'status-inactive'}">${u.is_active ? '● Active' : '● Inactive'}</span></td>
                    <td class="actions">
                        <button class="btn-toggle" onclick="toggleUser(${u.id})">${u.is_active ? 'Deactivate' : 'Activate'}</button>
                        <button class="btn-delete" onclick="deleteUser(${u.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                age: parseInt(document.getElementById('age').value) || 0,
                role: document.getElementById('role').value
            };
            await fetch(`${API}/users`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(user)
            });
            e.target.reset();
            refresh();
        });

        async function toggleUser(id) {
            await fetch(`${API}/users/${id}/toggle`, { method: 'PATCH' });
            refresh();
        }

        async function deleteUser(id) {
            await fetch(`${API}/users/${id}`, { method: 'DELETE' });
            refresh();
        }

        function refresh() { fetchStats(); fetchUsers(); }
        refresh();
    </script>
</body>
</html>
