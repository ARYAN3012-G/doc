<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Dashboard (MySQL)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 1.5rem; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { text-align: center; font-size: 2rem; margin-bottom: 0.3rem; background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .dashboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 1.5rem; }
        .stat { background: #1e293b; padding: 16px; border-radius: 10px; text-align: center; }
        .stat .num { font-size: 1.6rem; font-weight: 700; }
        .stat .lbl { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; margin-top: 2px; }
        .stat:nth-child(1) .num { color: #818cf8; }
        .stat:nth-child(2) .num { color: #22c55e; }
        .stat:nth-child(3) .num { color: #f59e0b; }
        .stat:nth-child(4) .num { color: #06b6d4; }
        .stat:nth-child(5) .num { color: #ef4444; }
        .tabs { display: flex; gap: 6px; margin-bottom: 1rem; }
        .tabs button { padding: 10px 20px; background: #1e293b; color: #94a3b8; border: 1px solid #334155; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; }
        .tabs button.active { background: #f59e0b; color: #0f172a; border-color: #f59e0b; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 1rem; }
        form { display: flex; gap: 10px; flex-wrap: wrap; }
        input, select { padding: 10px 14px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: 0.85rem; outline: none; }
        input:focus { border-color: #f59e0b; }
        button.btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; }
        .btn-primary { background: #f59e0b; color: #0f172a; }
        .btn-primary:hover { background: #d97706; }
        .btn-danger { background: #dc262620; color: #ef4444; }
        .btn-danger:hover { background: #dc2626; color: white; }
        .btn-sm { padding: 5px 10px; font-size: 0.75rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th { text-align: left; padding: 10px; color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid #334155; }
        td { padding: 10px; border-bottom: 1px solid #1e293b55; font-size: 0.85rem; }
        tr:hover { background: #1e293b; }
        .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-pending { background: #f59e0b20; color: #fbbf24; }
        .badge-confirmed { background: #3b82f620; color: #60a5fa; }
        .badge-shipped { background: #8b5cf620; color: #a78bfa; }
        .badge-delivered { background: #22c55e20; color: #4ade80; }
        .badge-cancelled { background: #ef444420; color: #f87171; }
        .empty { text-align: center; color: #475569; padding: 2rem; }
        .top-products { margin-top: 1rem; }
        .top-products li { padding: 8px 0; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 E-Commerce Dashboard</h1>
        <p class="subtitle">MySQL · JOINs · Transactions · Foreign Keys</p>

        <div class="dashboard" id="dashboard"></div>

        <div class="tabs">
            <button class="active" onclick="showTab('products')">Products</button>
            <button onclick="showTab('customers')">Customers</button>
            <button onclick="showTab('orders')">Orders</button>
        </div>

        <!-- PRODUCTS TAB -->
        <div class="section active" id="tab-products">
            <div class="card">
                <form id="product-form">
                    <input type="text" id="p-name" placeholder="Product Name" required style="flex:1">
                    <input type="number" id="p-price" placeholder="Price" step="0.01" required style="width:100px">
                    <input type="number" id="p-stock" placeholder="Stock" style="width:80px">
                    <select id="p-category">
                        <option value="electronics">Electronics</option>
                        <option value="clothing">Clothing</option>
                        <option value="books">Books</option>
                        <option value="food">Food</option>
                        <option value="other">Other</option>
                    </select>
                    <button type="submit" class="btn btn-primary">Add Product</button>
                </form>
            </div>
            <div class="card">
                <table><thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Stock</th><th>Category</th><th>Action</th></tr></thead>
                <tbody id="products-table"></tbody></table>
            </div>
        </div>

        <!-- CUSTOMERS TAB -->
        <div class="section" id="tab-customers">
            <div class="card">
                <form id="customer-form">
                    <input type="text" id="c-name" placeholder="Customer Name" required style="flex:1">
                    <input type="email" id="c-email" placeholder="Email" required style="flex:1">
                    <input type="text" id="c-phone" placeholder="Phone" style="width:130px">
                    <button type="submit" class="btn btn-primary">Add Customer</button>
                </form>
            </div>
            <div class="card">
                <table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Action</th></tr></thead>
                <tbody id="customers-table"></tbody></table>
            </div>
        </div>

        <!-- ORDERS TAB -->
        <div class="section" id="tab-orders">
            <div class="card">
                <form id="order-form">
                    <select id="o-customer" required style="flex:1"><option value="">Select Customer</option></select>
                    <select id="o-product" required style="flex:1"><option value="">Select Product</option></select>
                    <input type="number" id="o-qty" placeholder="Qty" min="1" value="1" required style="width:70px">
                    <button type="submit" class="btn btn-primary">Place Order</button>
                </form>
            </div>
            <div class="card">
                <table><thead><tr><th>ID</th><th>Customer</th><th>Product</th><th>Qty</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
                <tbody id="orders-table"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5003/api';

        // ─── Dashboard ─────────────────────────
        async function loadDashboard() {
            const res = await fetch(`${API}/dashboard`);
            const { data } = await res.json();
            document.getElementById('dashboard').innerHTML = `
                <div class="stat"><div class="num">${data.totalProducts}</div><div class="lbl">Products</div></div>
                <div class="stat"><div class="num">${data.totalCustomers}</div><div class="lbl">Customers</div></div>
                <div class="stat"><div class="num">${data.totalOrders}</div><div class="lbl">Orders</div></div>
                <div class="stat"><div class="num">₹${Number(data.totalRevenue).toLocaleString()}</div><div class="lbl">Revenue</div></div>
                <div class="stat"><div class="num">${data.pendingOrders}</div><div class="lbl">Pending</div></div>
            `;
        }

        // ─── Tabs ───────────────────────────────
        function showTab(tab) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.target.classList.add('active');
            if (tab === 'orders') loadOrderDropdowns();
        }

        // ─── Products ──────────────────────────
        async function loadProducts() {
            const { data } = await (await fetch(`${API}/products`)).json();
            document.getElementById('products-table').innerHTML = data.length === 0 ? '<tr><td colspan="6" class="empty">No products</td></tr>' :
                data.map(p => `<tr>
                    <td>${p.id}</td><td>${p.name}</td><td>₹${p.price}</td><td>${p.stock}</td><td>${p.category}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">Delete</button></td>
                </tr>`).join('');
        }
        document.getElementById('product-form').addEventListener('submit', async e => {
            e.preventDefault();
            await fetch(`${API}/products`, { method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ name: document.getElementById('p-name').value, price: parseFloat(document.getElementById('p-price').value),
                    stock: parseInt(document.getElementById('p-stock').value)||0, category: document.getElementById('p-category').value })
            });
            e.target.reset(); refresh();
        });
        async function deleteProduct(id) { await fetch(`${API}/products/${id}`, {method:'DELETE'}); refresh(); }

        // ─── Customers ─────────────────────────
        async function loadCustomers() {
            const { data } = await (await fetch(`${API}/customers`)).json();
            document.getElementById('customers-table').innerHTML = data.length === 0 ? '<tr><td colspan="5" class="empty">No customers</td></tr>' :
                data.map(c => `<tr>
                    <td>${c.id}</td><td>${c.name}</td><td>${c.email}</td><td>${c.phone||'—'}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="deleteCustomer(${c.id})">Delete</button></td>
                </tr>`).join('');
        }
        document.getElementById('customer-form').addEventListener('submit', async e => {
            e.preventDefault();
            await fetch(`${API}/customers`, { method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ name: document.getElementById('c-name').value, email: document.getElementById('c-email').value,
                    phone: document.getElementById('c-phone').value })
            });
            e.target.reset(); refresh();
        });
        async function deleteCustomer(id) { await fetch(`${API}/customers/${id}`, {method:'DELETE'}); refresh(); }

        // ─── Orders ────────────────────────────
        async function loadOrderDropdowns() {
            const [{ data: customers }, { data: products }] = await Promise.all([
                (await fetch(`${API}/customers`)).json(),
                (await fetch(`${API}/products`)).json()
            ]);
            document.getElementById('o-customer').innerHTML = '<option value="">Select Customer</option>' +
                customers.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            document.getElementById('o-product').innerHTML = '<option value="">Select Product</option>' +
                products.map(p => `<option value="${p.id}">${p.name} (₹${p.price} · Stock: ${p.stock})</option>`).join('');
        }
        async function loadOrders() {
            const { data } = await (await fetch(`${API}/orders`)).json();
            document.getElementById('orders-table').innerHTML = data.length === 0 ? '<tr><td colspan="8" class="empty">No orders</td></tr>' :
                data.map(o => `<tr>
                    <td>${o.id}</td><td>${o.customer_name}</td><td>${o.product_name}</td><td>${o.quantity}</td>
                    <td>₹${o.total_price}</td>
                    <td><span class="badge badge-${o.status}">${o.status}</span></td>
                    <td>${new Date(o.order_date).toLocaleDateString()}</td>
                    <td>
                        <select class="btn btn-sm" onchange="updateStatus(${o.id}, this.value)" style="background:#334155;color:#e2e8f0;border:1px solid #475569;padding:4px 6px;border-radius:6px;font-size:0.7rem">
                            <option value="pending" ${o.status==='pending'?'selected':''}>Pending</option>
                            <option value="confirmed" ${o.status==='confirmed'?'selected':''}>Confirmed</option>
                            <option value="shipped" ${o.status==='shipped'?'selected':''}>Shipped</option>
                            <option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option>
                            <option value="cancelled" ${o.status==='cancelled'?'selected':''}>Cancelled</option>
                        </select>
                        <button class="btn btn-danger btn-sm" onclick="deleteOrder(${o.id})">×</button>
                    </td>
                </tr>`).join('');
        }
        document.getElementById('order-form').addEventListener('submit', async e => {
            e.preventDefault();
            const res = await fetch(`${API}/orders`, { method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ customer_id: parseInt(document.getElementById('o-customer').value),
                    product_id: parseInt(document.getElementById('o-product').value),
                    quantity: parseInt(document.getElementById('o-qty').value) })
            });
            const result = await res.json();
            if (!result.success) alert(result.error);
            refresh();
        });
        async function updateStatus(id, status) { await fetch(`${API}/orders/${id}/status`, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status})}); refresh(); }
        async function deleteOrder(id) { await fetch(`${API}/orders/${id}`, {method:'DELETE'}); refresh(); }

        // ─── Refresh All ───────────────────────
        function refresh() { loadDashboard(); loadProducts(); loadCustomers(); loadOrders(); }
        refresh();
    </script>
</body>
</html>
